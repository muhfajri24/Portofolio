name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Mengambil isi repository terbaru dari branch main
      - name: Checkout repository
        uses: actions/checkout@v4

      # Mengaktifkan GitHub Pages untuk workflow ini
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Karena project ini statis, kita cukup upload file project apa adanya
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Mempublikasikan artifact ke GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
